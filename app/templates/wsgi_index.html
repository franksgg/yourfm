$def with (header)
    <head>
        <title>$header</title>
        <meta name="robots" content="noindex, nofollow" />
        <link href="/static/style.css" rel="stylesheet" type="text/css">
    </head>
    <body>
        <div class="container-medium">
            <h1 class="navy">$header</h1>
            <div class="section">
                <h2 class="sub-heading">Navigation</h2>
                <a href="../index" class="button-link">Back to Main Site</a>
            </div>
            <div class="section">
                <h2 class="sub-heading">Artists Management</h2>
                <p>View and manage artist information and images.</p>
                <a href="../edit/artists" class="button-link">View All Artists</a>
            </div>

            <div class="section">
                <h2 class="sub-heading">Albums Management</h2>
                <p>View and manage album information and images.</p>
                <a href="../edit/albums" class="button-link">View All Albums</a>
            </div>

            <div class="section">
                <h2 class="sub-heading">Navigation</h2>
                <a href="../index" class="button-link">Back to Main Site</a>
            </div>
        </div>
    </body>
