$def with (header, json_data, form, start_date, end_date)
<head>
    <title>$header</title>
    <meta name="robots" content="noindex, nofollow" />
    <link href="static/style.css" rel="stylesheet" type="text/css">
    <script src="static/jquery.min.js"></script>
    <script src="static/chart.js"></script>
</head>
<body>
    <div class="container">
        <h1>Weather Data</h1>

        <!-- Date Range Selection Form -->
        <form class="date-range-form" method="post">
            <div class="date-field">
                <label for="start_date">Start Time:</label>
                <input type="datetime-local" id="start_date" name="start_date" value="$start_date" required>
            </div>

            <div class="date-field">
                <label for="end_date">End Time:</label>
                <input type="datetime-local" id="end_date" name="end_date" value="$end_date" required>
            </div>

            <button type="submit" class="update-button">Update</button>

            <div class="date-range-info">
                Showing data from $start_date.replace('T', ' ') to $end_date.replace('T', ' ')
            </div>
        </form>

        <!-- Chart Containers -->
        <div class="chart-container">
            <canvas id="tempChart"></canvas>
        </div>

        <div class="chart-container">
            <canvas id="windChart"></canvas>
        </div>

        <div class="chart-container">
            <canvas id="rainChart"></canvas>
        </div>

        <div class="chart-container">
            <canvas id="pressureChart"></canvas>
        </div>

        <div class="chart-container">
            <canvas id="humidityChart"></canvas>
        </div>

        <div class="chart-container">
            <canvas id="uvChart"></canvas>
        </div>

        <!-- Navigation -->
        <div class="navigation">
            <a href="/index" class="button">Back to Home</a>
        </div>
    </div>

    <script>
        // Parse the JSON data
        const weatherData = $:json_data;

        // Extract timestamps for x-axis
        const timestamps = weatherData.map(item => item.ts);

        // Temperature and Dewpoint Chart
        const tempCtx = document.getElementById('tempChart').getContext('2d');
        const tempChart = new Chart(tempCtx, {
            type: 'line',
            data: {
                labels: timestamps,
                datasets: [
                    {
                        label: 'Temperature (°C)',
                        data: weatherData.map(item => item.temp),
                        borderColor: 'rgb(255, 99, 132)',
                        backgroundColor: 'rgba(255, 99, 132, 0.1)',
                        borderWidth: 1,
                        pointRadius: 0,
                        fill: true,
                        tension: 0.1
                    },
                    {
                        label: 'Dew Point (°C)',
                        data: weatherData.map(item => item.dew_point),
                        borderColor: 'rgb(54, 162, 235)',
                        backgroundColor: 'rgba(54, 162, 235, 0.1)',
                        borderWidth: 1,
                        pointRadius: 0,
                        fill: true,
                        tension: 0.1
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    title: {
                        display: true,
                        text: 'Temperature and Dew Point'
                    },
                    tooltip: {
                        mode: 'index',
                        intersect: false
                    }
                },
                scales: {
                    x: {
                        title: {
                            display: true,
                            text: 'Time'
                        },
                        ticks: {
                            maxRotation: 45,
                            minRotation: 45
                        }
                    },
                    y: {
                        title: {
                            display: true,
                            text: 'Temperature (°C)'
                        }
                    }
                }
            }
        });

        // Wind and Gust Chart
        const windCtx = document.getElementById('windChart').getContext('2d');
        const windChart = new Chart(windCtx, {
            type: 'line',
            data: {
                labels: timestamps,
                datasets: [
                    {
                        label: 'Wind (bft)',
                        data: weatherData.map(item => item.wind),
                        borderColor: 'rgb(75, 192, 192)',
                        backgroundColor: 'rgba(75, 192, 192, 0.1)',
                        borderWidth: 1,
                        pointRadius: 0,
                        fill: true,
                        tension: 0.1
                    },
                    {
                        label: 'Wind Gust (bft)',
                        data: weatherData.map(item => item.wind_gust),
                        borderColor: 'rgb(153, 102, 255)',
                        backgroundColor: 'rgba(153, 102, 255, 0.1)',
                        borderWidth: 1,
                        pointRadius: 0,
                        fill: true,
                        tension: 0.1
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    title: {
                        display: true,
                        text: 'Wind and Gust'
                    },
                    tooltip: {
                        mode: 'index',
                        intersect: false
                    }
                },
                scales: {
                    x: {
                        title: {
                            display: true,
                            text: 'Time'
                        },
                        ticks: {
                            maxRotation: 45,
                            minRotation: 45
                        }
                    },
                    y: {
                        title: {
                            display: true,
                            text: 'Speed (bft)'
                        }
                    }
                }
            }
        });

        // Rain Chart
        const rainCtx = document.getElementById('rainChart').getContext('2d');
        const rainChart = new Chart(rainCtx, {
            type: 'line',
            data: {
                labels: timestamps,
                datasets: [
                    {
                        label: 'Rain (mm)',
                        data: weatherData.map(item => item.rain),
                        borderColor: 'rgb(54, 162, 235)',
                        backgroundColor: 'rgba(54, 162, 235, 0.1)',
                        borderWidth: 1,
                        pointRadius: 0,
                        fill: true,
                        tension: 0.1
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    title: {
                        display: true,
                        text: 'Rain'
                    },
                    tooltip: {
                        mode: 'index',
                        intersect: false
                    }
                },
                scales: {
                    x: {
                        title: {
                            display: true,
                            text: 'Time'
                        },
                        ticks: {
                            maxRotation: 45,
                            minRotation: 45
                        }
                    },
                    y: {
                        title: {
                            display: true,
                            text: 'Rain (mm)'
                        }
                    }
                }
            }
        });

        // Pressure Chart
        const pressureCtx = document.getElementById('pressureChart').getContext('2d');
        const pressureChart = new Chart(pressureCtx, {
            type: 'line',
            data: {
                labels: timestamps,
                datasets: [
                    {
                        label: 'Pressure (hPa)',
                        data: weatherData.map(item => item.pressure),
                        borderColor: 'rgb(255, 159, 64)',
                        backgroundColor: 'rgba(255, 159, 64, 0.1)',
                        borderWidth: 1,
                        pointRadius: 0,
                        fill: true,
                        tension: 0.1
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    title: {
                        display: true,
                        text: 'Pressure'
                    },
                    tooltip: {
                        mode: 'index',
                        intersect: false
                    }
                },
                scales: {
                    x: {
                        title: {
                            display: true,
                            text: 'Time'
                        },
                        ticks: {
                            maxRotation: 45,
                            minRotation: 45
                        }
                    },
                    y: {
                        title: {
                            display: true,
                            text: 'Pressure (hPa)'
                        }
                    }
                }
            }
        });

        // Humidity Chart
        const humidityCtx = document.getElementById('humidityChart').getContext('2d');
        const humidityChart = new Chart(humidityCtx, {
            type: 'line',
            data: {
                labels: timestamps,
                datasets: [
                    {
                        label: 'Humidity (%)',
                        data: weatherData.map(item => item.humidity),
                        borderColor: 'rgb(75, 192, 192)',
                        backgroundColor: 'rgba(75, 192, 192, 0.1)',
                        borderWidth: 1,
                        pointRadius: 0,
                        fill: true,
                        tension: 0.1
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    title: {
                        display: true,
                        text: 'Humidity'
                    },
                    tooltip: {
                        mode: 'index',
                        intersect: false
                    }
                },
                scales: {
                    x: {
                        title: {
                            display: true,
                            text: 'Time'
                        },
                        ticks: {
                            maxRotation: 45,
                            minRotation: 45
                        }
                    },
                    y: {
                        title: {
                            display: true,
                            text: 'Humidity (%)'
                        }
                    }
                }
            }
        });

        // UV Index Chart
        const uvCtx = document.getElementById('uvChart').getContext('2d');
        const uvChart = new Chart(uvCtx, {
            type: 'line',
            data: {
                labels: timestamps,
                datasets: [
                    {
                        label: 'UV Index',
                        data: weatherData.map(item => item.uv_index),
                        borderColor: 'rgb(153, 102, 255)',
                        backgroundColor: 'rgba(153, 102, 255, 0.1)',
                        borderWidth: 1,
                        pointRadius: 0,
                        fill: true,
                        tension: 0.1
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    title: {
                        display: true,
                        text: 'UV Index'
                    },
                    tooltip: {
                        mode: 'index',
                        intersect: false
                    }
                },
                scales: {
                    x: {
                        title: {
                            display: true,
                            text: 'Time'
                        },
                        ticks: {
                            maxRotation: 45,
                            minRotation: 45
                        }
                    },
                    y: {
                        title: {
                            display: true,
                            text: 'UV Index'
                        }
                    }
                }
            }
        });
    </script>
</body>
